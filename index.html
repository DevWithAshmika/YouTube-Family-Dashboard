<!DOCTYPE html>
<html>
<head>
  <title>Payment Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI';
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 200px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .pay {
      color: red;
      font-weight: bold;
    }

    .ok {
      color: lime;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>YouTube Family Dashboard</h1>

<div class="card-container" id="cards"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwRzhyafxmz7sCiTkSPmvT5z2Na5tywP1v_GlQ-iHP9SK9gaTTfe2ahE4g_fSt4H2Aa/exec";

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const container = document.getElementById("cards");
  container.innerHTML = "";

  data.forEach(user => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h2>${user.name}</h2>
      <p>Paid Months: ${user.paid}</p>
      <p>Should Pay: Rs.${user.balance}</p>
      <p class="${user.balance > 0 ? 'pay' : 'ok'}">
        ${user.balance > 0 ? ' Pay' : 'OK'}
      </p>
    `;

    container.appendChild(card);
  });
}

loadData();

// Auto refresh every 30 seconds
setInterval(loadData, 30000);
</script>

</body>
</html>
